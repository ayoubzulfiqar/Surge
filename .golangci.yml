# .golangci.yml
version: "2"

run:
  tests: true

linters:
  disable-all: true
  enable:
    # correctness
    - staticcheck
    - govet
    - errcheck
    - unused
    - ineffassign
    - makezero
    - nilerr
    - errorlint
    - contextcheck

    # performance
    - prealloc
    - perfsprint
    - usestdlibvars

    # resource safety
    - bodyclose
    - noctx
    - sqlclosecheck
    - rowserrcheck
    - gosec

    # style / quality
    - gocritic
    - unparam
    - nestif
    - dupword
    - gocognit

settings:
  govet:
    enable:
      - shadow
      - fieldalignment
      - copylocks
      - unusedresult

  unparam:
    check-exported: false

  gosec:
    excludes:
      - G304

  gocritic:
    enabled-tags:
      - performance
      - diagnostic
      - style

  errorlint:
    check-type-assertions: true